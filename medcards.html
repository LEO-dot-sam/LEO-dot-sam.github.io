
<!DOCTYPE html>
<html>
<head>

  <title>MedCards Collection | Lionel Sam</title>

  <!-- 📊 Google Analytics -->

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NSW6R43VFE"></script>

  <script>

    window.dataLayer = window.dataLayer || [];

    function gtag(){dataLayer.push(arguments);}

    gtag('js', new Date());

    gtag('config', 'G-NSW6R43VFE');

  </script>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="MedCards collection by Lionel Sam — a gamified medical learning system based on MedWordle.">

  <link rel="stylesheet" href="medwordle.css">

</head>
<body>
  <h1>🃏 MedCards Collection</h1>
  <div id="cards"></div>

  <script>
    const cardsDiv = document.getElementById("cards");
    const collected = JSON.parse(localStorage.getItem("medwordleCards") || "[]");

    if (collected.length === 0) {
      cardsDiv.innerHTML = "<p>No cards yet. Solve Daily Challenge to unlock!</p>";
    } else {
      collected.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <h3>${card.word}</h3>
          <p><strong>${card.specialty}</strong></p>
          <p>⭐ ${card.rarity}</p>
          <p>${card.badge}</p>
        `;
        cardsDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
